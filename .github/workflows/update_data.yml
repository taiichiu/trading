name: Update Indices Data

on:
  schedule:
    - cron: '30 8 * * 2-6'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update indices data (incremental daily, full monthly)
        run: python scripts/fetch_data.py --incremental

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/indices.json
          git diff --staged --quiet || git commit -m "chore: update indices data $(date +'%Y-%m-%d')"
          git push

name: Initialize Historical Indices Data

on:
  workflow_dispatch

jobs:
  init-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch complete historical data (10 years daily + all monthly)
        run: python scripts/init_historical_data.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/indices.json
          git diff --staged --quiet || git commit -m "chore: initialize indices data with complete history"
          git push

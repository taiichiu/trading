<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>風險管理｜市場韻腳資料庫</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1.5rem; }
  nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  nav a { font-size: 0.85rem; color: #64748b; text-decoration: none; }
  nav a:hover { color: #e2e8f0; }
  nav span { color: #334155; }
  h2 { font-size: 1.2rem; font-weight: 500; color: #f1f5f9; }
  .sub { font-size: 0.82rem; color: #64748b; margin-top: 0.25rem; margin-bottom: 1.5rem; }
  .stack { display: flex; flex-direction: column; gap: 1rem; max-width: 760px; }
  .card { background: #1e293b; border: 0.5px solid #334155; border-radius: 12px; padding: 1.25rem 1.5rem; }
  .card h3 { font-size: 1.05rem; color: #f1f5f9; margin-bottom: 0.85rem; font-weight: 500;
    display: flex; align-items: baseline; gap: 0.5rem; }
  .card h3 .tag { font-size: 0.7rem; color: #64748b; font-weight: 400; }
  ol.rules { padding-left: 1.4rem; }
  ol.rules li { font-size: 0.86rem; color: #cbd5e1; line-height: 1.85; padding: 1px 0; }
  dl.params { display: grid; grid-template-columns: max-content 1fr; gap: 8px 16px; }
  dl.params dt { font-size: 0.78rem; color: #64748b; padding-top: 2px; }
  dl.params dd { font-size: 0.86rem; color: #cbd5e1; line-height: 1.6; }
  dl.params dd strong { color: #fbbf24; }
</style>
</head>
<body>

<nav>
  <a href="../index.html">← 首頁</a>
  <span>/</span>
  <span style="color:#94a3b8">風險管理</span>
</nav>

<h2>風險管理框架</h2>
<p class="sub">從不同流派整理的部位、停損、資金控管原則。</p>

<div id="stack" class="stack"></div>

<script>
const PARAM_LABEL = {
  wave_trade_loss_limit: '波段單筆停損',
  wave_trade_win_rate: '波段勝率',
  short_trade_win_rate: '短線勝率',
  wave_leverage_max: '波段最大槓桿',
  day_trade_leverage_max: '日內最大槓桿',
  unrealized_loss_days_ratio: '未實現虧損占比',
  core_metric: '核心指標',
  position_sizing: '部位分配',
  entry_signal: '進場訊號',
  add_position: '加碼條件',
  exit_signal: '出場訊號',
  holding: '持有原則',
  time_frame_futures: '期貨週期',
  time_frame_stocks: '股票週期',
};

async function init() {
  const res = await fetch('../data/rhymes.json');
  const data = await res.json();
  const stack = document.getElementById('stack');
  data.risk_management.frameworks.forEach(f => stack.appendChild(buildFramework(f)));
}

function buildFramework(f) {
  const card = document.createElement('div');
  card.className = 'card';

  const h3 = document.createElement('h3');
  h3.innerHTML = `${f.source} <span class="tag">Risk Framework</span>`;
  card.appendChild(h3);

  if (f.rules) {
    const ol = document.createElement('ol');
    ol.className = 'rules';
    f.rules.forEach(r => {
      const li = document.createElement('li');
      li.textContent = r;
      ol.appendChild(li);
    });
    card.appendChild(ol);
  }

  if (f.parameters) {
    const dl = document.createElement('dl');
    dl.className = 'params';
    Object.entries(f.parameters).forEach(([k, v]) => {
      const dt = document.createElement('dt');
      dt.textContent = PARAM_LABEL[k] || k;
      const dd = document.createElement('dd');
      dd.textContent = v;
      dl.appendChild(dt);
      dl.appendChild(dd);
    });
    card.appendChild(dl);
  }
  return card;
}

init();
</script>
<script src="../js/chat.js"></script>
</body>
</html>

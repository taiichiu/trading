<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K線走勢｜市場韻腳資料庫</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1.5rem; }
  nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
  nav a { font-size: 0.85rem; color: #64748b; text-decoration: none; }
  nav a:hover { color: #e2e8f0; }
  nav span { color: #334155; }
  h2 { font-size: 1.2rem; font-weight: 500; color: #f1f5f9; }
  .sub { font-size: 0.82rem; color: #64748b; margin-top: 0.25rem; margin-bottom: 1.25rem; }
  .controls { display: flex; gap: 8px; margin-bottom: 0.75rem; flex-wrap: wrap; align-items: center; }
  .controls label { font-size: 0.8rem; color: #64748b; }
  button { font-size: 0.8rem; padding: 4px 14px; border-radius: 6px; cursor: pointer;
    border: 0.5px solid #334155; background: transparent; color: #94a3b8; transition: all 0.15s; }
  button.active { background: #1e3a5f; color: #60a5fa; border-color: #3b82f6; }
  button.overlay-btn.active { background: rgba(251,191,36,0.12); color: #fbbf24; border-color: #fbbf24; }
  button:hover:not(.active) { border-color: #64748b; color: #e2e8f0; }
  #chart { width: 100%; height: 560px; }
  @media (max-width: 640px) {
    body { padding: 1rem 0.75rem; }
    #chart { height: 440px; }
  }
  .note { margin-top: 1.25rem; font-size: 0.78rem; color: #475569; line-height: 1.8; }
  #lastUpdated { font-size: 0.75rem; color: #475569; margin-top: 0.5rem; }
</style>
</head>
<body>

<nav>
  <a href="../index.html">← 首頁</a>
  <span>/</span>
  <span style="color:#94a3b8">K線走勢</span>
</nav>

<h2>K線走勢</h2>
<p class="sub">台灣加權指數（TAIEX）K線。跌紅漲綠（台股慣例）。週/月K由日K於前端聚合而成。</p>

<div class="controls">
  <label>週期：</label>
  <button class="tf-btn active" data-tf="daily">日K</button>
  <button class="tf-btn" data-tf="weekly">週K</button>
  <button class="tf-btn" data-tf="monthly">月K</button>
</div>

<div class="controls">
  <label>時間範圍：</label>
  <button class="range-btn" data-range="3m">近3月</button>
  <button class="range-btn" data-range="6m">近半年</button>
  <button class="range-btn active" data-range="1y">近1年</button>
  <button class="range-btn" data-range="all">全部</button>
</div>

<div class="controls">
  <label>疊加指標：</label>
  <button class="overlay-btn" data-overlay="buffett">巴菲特指標</button>
</div>

<div id="chart"></div>

<div class="note">
  📈 <span style="color:#ef4444;">紅實體</span> 收盤 &gt; 開盤（上漲）
  &nbsp;&nbsp;
  📉 <span style="color:#10b981;">綠實體</span> 收盤 &lt; 開盤（下跌）
  <br>
  滑鼠移至K棒可查看當日 OHLCV 詳細資料。
  <br>
  <span style="color:#fbbf24;">⓵ 巴菲特指標</span>＝台股總市值 ÷ GDP × 100%。
  &gt;115% 高估、&gt;135% 顯著高估。
  目前資料為公開來源年度近似值，可在 <code style="color:#94a3b8">data/buffett.json</code> 編輯。
</div>
<div id="lastUpdated"></div>

<script>
const UP_COLOR = '#ef4444';      // red (up) - TW convention
const DOWN_COLOR = '#10b981';    // green (down) - TW convention
const VOLUME_UP = '#7f1d1d';
const VOLUME_DOWN = '#064e3b';

const BUFFETT_COLOR = '#fbbf24';  // amber

let chart, rawDaily = [], buffettData = null;
let currentRange = '1y', currentTimeframe = 'daily';
let overlayBuffett = false;

// Bars per range, by timeframe — used to compute initial data zoom window.
const BARS_PER_RANGE = {
  daily:   { '3m': 63,  '6m': 126, '1y': 252 },
  weekly:  { '3m': 13,  '6m': 26,  '1y': 52  },
  monthly: { '3m': 3,   '6m': 6,   '1y': 12  },
};

async function init() {
  const [indicesRes, buffettRes] = await Promise.all([
    fetch('../data/indices.json').then(r => r.json()),
    fetch('../data/buffett.json').then(r => r.ok ? r.json() : null).catch(() => null),
  ]);
  rawDaily = (indicesRes.TAIEX && indicesRes.TAIEX.daily) || [];
  buffettData = buffettRes;

  document.getElementById('lastUpdated').textContent =
    '數據最後更新：' + (indicesRes.lastUpdated || '—') +
    '　｜　日K筆數：' + rawDaily.length.toLocaleString();

  bindButtons('.tf-btn',    'tf',    v => { currentTimeframe = v; });
  bindButtons('.range-btn', 'range', v => { currentRange = v; });
  bindOverlayButtons();
  renderChart();
}

// Overlay buttons toggle (multi-select-able, currently just 巴菲特)
function bindOverlayButtons() {
  document.querySelectorAll('.overlay-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const k = btn.dataset.overlay;
      if (k === 'buffett') overlayBuffett = !overlayBuffett;
      btn.classList.toggle('active');
      renderChart();
    });
  });
}

// Build a dense buffett series by linear-interpolating annual data points
// across every series date, so the line is visible in any zoom range.
function buildBuffettSeries(seriesDates) {
  if (!buffettData || !buffettData.annual || buffettData.annual.length === 0) return [];
  const ann = buffettData.annual.map(it => ({
    ts: new Date(it.date + 'T00:00:00Z').getTime(),
    v: it.value,
  })).sort((a, b) => a.ts - b.ts);
  const first = ann[0], last = ann[ann.length - 1];

  const out = [];
  for (const d of seriesDates) {
    // d is 'YYYY-MM-DD' (daily/weekly) or 'YYYY-MM' (monthly view)
    const dateStr = d.length === 7 ? d + '-15' : d;
    const ts = new Date(dateStr + 'T00:00:00Z').getTime();
    let v;
    if (ts <= first.ts) v = first.v;
    else if (ts >= last.ts) v = last.v;
    else {
      for (let i = 0; i < ann.length - 1; i++) {
        if (ts >= ann[i].ts && ts <= ann[i + 1].ts) {
          const r = (ts - ann[i].ts) / (ann[i + 1].ts - ann[i].ts);
          v = ann[i].v + (ann[i + 1].v - ann[i].v) * r;
          break;
        }
      }
    }
    out.push([d, +v.toFixed(2)]);
  }
  return out;
}

function bindButtons(selector, dataKey, setter) {
  document.querySelectorAll(selector).forEach(btn => {
    btn.addEventListener('click', () => {
      setter(btn.dataset[dataKey]);
      document.querySelectorAll(selector).forEach(b =>
        b.classList.toggle('active', b === btn));
      renderChart();
    });
  });
}

// Aggregate daily OHLCV into weekly/monthly buckets.
function aggregate(daily, tf) {
  if (tf === 'daily' || daily.length === 0) return daily;

  const keyOf = (dateStr) => {
    if (tf === 'monthly') return dateStr.slice(0, 7); // YYYY-MM
    // weekly: align to ISO week's Monday
    const dt = new Date(dateStr + 'T00:00:00Z');
    const day = dt.getUTCDay() || 7; // Sunday=7, Monday=1
    const monday = new Date(dt);
    monday.setUTCDate(dt.getUTCDate() - day + 1);
    return monday.toISOString().slice(0, 10);
  };

  const groups = new Map();
  daily.forEach(d => {
    const k = keyOf(d.date);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(d);
  });

  const out = [];
  Array.from(groups.keys()).sort().forEach(k => {
    const rows = groups.get(k);
    const highs = rows.map(r => r.high).filter(v => v != null);
    const lows  = rows.map(r => r.low ).filter(v => v != null);
    out.push({
      date: rows[rows.length - 1].date,
      open: rows[0].open,
      close: rows[rows.length - 1].close,
      high: highs.length ? Math.max(...highs) : null,
      low:  lows.length  ? Math.min(...lows)  : null,
      volume: rows.reduce((s, r) => s + (r.volume || 0), 0),
    });
  });
  return out;
}

function computeDataZoom(n) {
  if (n === 0) return { start: 0, end: 100 };
  if (currentRange === 'all') return { start: 0, end: 100 };

  const wanted = (BARS_PER_RANGE[currentTimeframe] || {})[currentRange];
  if (!wanted || wanted >= n) return { start: 0, end: 100 };

  const startIdx = Math.max(0, n - wanted);
  return { start: (startIdx / (n - 1)) * 100, end: 100 };
}

function renderChart() {
  if (!chart) chart = echarts.init(document.getElementById('chart'), 'dark');

  const series = aggregate(rawDaily, currentTimeframe);

  const tc = '#64748b', gc = '#1e2533', lc = '#2a3547';
  const dates = series.map(d =>
    currentTimeframe === 'monthly' ? d.date.slice(0, 7) : d.date
  );
  // ECharts candlestick expects [open, close, low, high]
  const candles = series.map(d => [d.open, d.close, d.low, d.high]);
  const volumes = series.map(d => ({
    value: d.volume || 0,
    itemStyle: {
      color: (d.close >= d.open) ? VOLUME_UP : VOLUME_DOWN
    }
  }));

  const zoom = computeDataZoom(series.length);
  const narrow = window.innerWidth < 640;

  chart.setOption({
    backgroundColor: 'transparent',
    animation: false,
    axisPointer: { link: [{ xAxisIndex: 'all' }] },
    grid: [
      { left: narrow ? 56 : 72, right: 16, top: 30, height: '62%' },
      { left: narrow ? 56 : 72, right: 16, top: '76%', height: '14%' }
    ],
    xAxis: [
      {
        type: 'category', data: dates, boundaryGap: true,
        axisLine: { lineStyle: { color: lc } },
        axisLabel: { color: tc, fontSize: narrow ? 10 : 11 },
        splitLine: { show: false },
        axisPointer: { label: { backgroundColor: '#1a2233' } }
      },
      {
        type: 'category', gridIndex: 1, data: dates, boundaryGap: true,
        axisLine: { lineStyle: { color: lc } },
        axisLabel: { show: false },
        axisTick: { show: false },
        splitLine: { show: false }
      }
    ],
    yAxis: [
      {
        scale: true,
        name: '點數', nameTextStyle: { color: tc, fontSize: 10, padding: [0, 0, 0, narrow ? 20 : 40] },
        axisLine: { lineStyle: { color: lc } },
        axisLabel: { color: tc, fontSize: narrow ? 10 : 11,
          formatter: v => v >= 10000 ? (v/1000).toFixed(1)+'K' : v },
        splitLine: { lineStyle: { color: gc, type: 'dashed' } }
      },
      {
        scale: true, gridIndex: 1,
        axisLine: { lineStyle: { color: lc } },
        axisLabel: { color: tc, fontSize: 9,
          formatter: v => v === 0 ? '' : (v >= 1e8 ? (v/1e8).toFixed(1)+'億' :
            (v >= 1e4 ? (v/1e4).toFixed(0)+'萬' : v)) },
        splitLine: { show: false }
      },
      // [2] Buffett indicator (right-side %, on main grid)
      {
        scale: true, gridIndex: 0, position: 'right',
        name: '巴菲特(%)',
        nameTextStyle: { color: BUFFETT_COLOR, fontSize: 10 },
        axisLine: { show: overlayBuffett, lineStyle: { color: BUFFETT_COLOR } },
        axisTick: { show: overlayBuffett },
        axisLabel: { show: overlayBuffett, color: BUFFETT_COLOR, fontSize: 10,
          formatter: '{value}%' },
        splitLine: { show: false },
      }
    ],
    dataZoom: [
      {
        type: 'inside', xAxisIndex: [0, 1],
        start: zoom.start, end: zoom.end, zoomOnMouseWheel: true
      },
      {
        type: 'slider', xAxisIndex: [0, 1],
        bottom: 0, height: 18,
        start: zoom.start, end: zoom.end,
        textStyle: { color: tc, fontSize: 10 },
        borderColor: '#334155', backgroundColor: '#1a2233',
        fillerColor: 'rgba(59,130,246,0.12)',
        handleStyle: { color: '#3b82f6' },
        moveHandleStyle: { color: '#3b82f6' }
      }
    ],
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'cross' },
      backgroundColor: '#1a2233', borderColor: '#334155',
      textStyle: { color: '#e2e8f0', fontSize: 12 },
      formatter: params => {
        if (!params || !params.length) return '';
        const i = params[0].dataIndex;
        const d = series[i];
        if (!d) return '';
        const chg = d.close - d.open;
        const chgPct = d.open ? (chg / d.open * 100) : 0;
        const chgColor = chg >= 0 ? UP_COLOR : DOWN_COLOR;
        const sign = chg >= 0 ? '+' : '';
        const fmt = v => (v == null ? '—' : v.toLocaleString(undefined, { maximumFractionDigits: 2 }));
        const fmtVol = v => {
          if (!v) return '—';
          if (v >= 1e8) return (v / 1e8).toFixed(2) + ' 億';
          if (v >= 1e4) return (v / 1e4).toFixed(0) + ' 萬';
          return v.toLocaleString();
        };
        const tfLabel = { daily: '日K', weekly: '週K', monthly: '月K' }[currentTimeframe];
        const dateLabel = currentTimeframe === 'monthly' ? d.date.slice(0, 7) : d.date;

        let extra = '';
        if (overlayBuffett && buffettData && buffettData.annual) {
          const yr = d.date.slice(0, 4);
          // Latest annual data point on or before current year
          let bv = null;
          for (const it of buffettData.annual) {
            if (it.date.slice(0, 4) <= yr) bv = it.value;
          }
          if (bv != null) {
            extra = `<br/><span style="color:${BUFFETT_COLOR}">巴菲特指標</span> ` +
              `<b style="color:${BUFFETT_COLOR}">${bv}%</b> <span style="color:${tc};font-size:10px">(年度近似值)</span>`;
          }
        }

        return `<b>${dateLabel}</b> <span style="color:${tc};font-size:10px">(${tfLabel})</span><br/>` +
          `<span style="color:${tc}">開</span> ${fmt(d.open)}　` +
          `<span style="color:${tc}">高</span> ${fmt(d.high)}<br/>` +
          `<span style="color:${tc}">低</span> ${fmt(d.low)}　` +
          `<span style="color:${tc}">收</span> <b style="color:${chgColor}">${fmt(d.close)}</b><br/>` +
          `<span style="color:${tc}">漲跌</span> <span style="color:${chgColor}">${sign}${fmt(chg)} (${sign}${chgPct.toFixed(2)}%)</span><br/>` +
          `<span style="color:${tc}">量</span> ${fmtVol(d.volume)}` + extra;
      }
    },
    series: [
      {
        name: 'TAIEX', type: 'candlestick',
        data: candles,
        itemStyle: {
          color: UP_COLOR, color0: DOWN_COLOR,
          borderColor: UP_COLOR, borderColor0: DOWN_COLOR
        }
      },
      {
        name: '成交量', type: 'bar',
        xAxisIndex: 1, yAxisIndex: 1,
        data: volumes,
        barWidth: '60%'
      },
      ...(overlayBuffett ? [{
        name: '巴菲特指標',
        type: 'line',
        yAxisIndex: 2,
        data: buildBuffettSeries(dates),
        showSymbol: false,
        lineStyle: { color: BUFFETT_COLOR, width: 2 },
        itemStyle: { color: BUFFETT_COLOR },
        smooth: true,
        z: 6,
        tooltip: { valueFormatter: v => v + '%' },
      }] : [])
    ]
  }, true);
}

window.addEventListener('resize', () => { if (chart) { chart.resize(); renderChart(); } });
init();
</script>
<script src="../js/chat.js"></script>
</body>
</html>
